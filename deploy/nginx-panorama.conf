# panorama-cpp server block — deployed into the panorama-conf volume as
# default.conf (replaces the stock nginx welcome page config).
# deploy.sh installs the app at the volume root (index.html's relative
# ../build-wasm and ../data references resolve fine from /):
#   /srv/panorama/               index.html, app.js
#   /srv/panorama/build-wasm/    pano.js, pano.wasm
#   /srv/panorama/data/          hgt3-zst/, peaks-rated.tsv (own volume)

server {
    listen 80 default_server;
    root /srv/panorama;

    # nginx would otherwise build absolute Location: headers with its
    # *internal* port 80, breaking the 8081:80 publish mapping (e.g. on the
    # automatic directory-slash redirect).
    absolute_redirect off;

    # types{} REPLACES the inherited MIME table, so pull in the stock one
    # first, then add what it lacks (wasm is stock since nginx 1.21;
    # repeated so it never regresses).
    include /etc/nginx/mime.types;
    types {
        application/wasm          wasm;
        text/tab-separated-values tsv;
        application/zstd          zst;
    }
    default_type application/octet-stream;

    gzip on;
    gzip_min_length 1024;
    # peaks-rated.tsv 1.3 MB -> ~300 KB, pano.wasm roughly halves.
    gzip_types text/tab-separated-values application/wasm application/javascript;

    # App + wasm change on every deploy: always revalidate (cheap, files are
    # small; Cloudflare respects this). Longer-prefix /data/ blocks below
    # take precedence over this catch-all.
    location / {
        add_header Cache-Control "no-cache";
    }
    location /build-wasm/ {
        add_header Cache-Control "no-cache";
    }

    # Tiles are immutable — let browsers and the Cloudflare edge keep them
    # forever; each tile leaves this box once. Already zstd, don't gzip.
    location /data/hgt3-zst/ {
        autoindex on;              # JSON tile listing = data discovery for the app
        autoindex_format json;
        add_header Cache-Control "public, max-age=31536000, immutable";
        gzip off;
    }
    location /data/ {
        add_header Cache-Control "public, max-age=3600";
    }

    # Future API sidecar (rust/python "what is that" service) slots in here:
    # location /api/ { proxy_pass http://panorama-api:8000/; }

    # A pthreads WASM build would need cross-origin isolation; everything is
    # same-origin here, so these two lines are the whole cost:
    # add_header Cross-Origin-Opener-Policy same-origin;
    # add_header Cross-Origin-Embedder-Policy require-corp;
}
