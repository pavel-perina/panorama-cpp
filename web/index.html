<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>panorama-cpp web</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden;
               background: #002b36; color: #839496;
               font: 14px/1.4 system-ui, sans-serif; }
  #bar { padding: 6px 10px; }
  #view { display: block; touch-action: none; cursor: grab;
          image-rendering: pixelated; }
</style>
</head>
<body>
<div id="bar">
  <span id="status">panorama-cpp — loading…</span>
  <label id="visctl" style="float:right; display:none">
    visibility <input id="vis" type="range" min="10" max="300" step="5" value="100"
                      style="vertical-align:middle"> <span id="visval">100 km</span>
  </label>
  <label id="refrctl" style="float:right; display:none; margin-right:20px">
    refraction <input id="refr" type="range" min="1.00" max="1.30" step="0.01" value="1.18"
                      style="vertical-align:middle"> <span id="refrval">1.18</span>
  </label>
</div>
<canvas id="view"></canvas>
<script src="../build-wasm/pano.js"></script>
<script src="app.js"></script>
</body>
</html>
